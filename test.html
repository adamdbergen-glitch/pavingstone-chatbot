<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Paving Stone Pros Chatbot Test</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 0; background: #f5f5f5; }
    #chat-container {
      max-width: 420px;
      height: 80vh;
      margin: 20px auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #chat-header {
      background: #333;
      color: #fff;
      padding: 10px 12px;
      font-size: 14px;
    }
    #messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      font-size: 14px;
      background: #fafafa;
    }
    .msg { margin-bottom: 8px; }
    .msg-user { text-align: right; }
    .msg-assistant { text-align: left; }
    .msg-user span {
      display: inline-block;
      background: #007bff;
      color: #fff;
      padding: 6px 10px;
      border-radius: 12px;
    }
    .msg-assistant span {
      display: inline-block;
      background: #e5e5e5;
      padding: 6px 10px;
      border-radius: 12px;
    }
    #input-row {
      display: flex;
      border-top: 1px solid #ddd;
    }
    #input {
      flex: 1;
      border: none;
      padding: 8px;
      font-size: 14px;
      outline: none;
    }
    #send-btn {
      border: none;
      padding: 0 12px;
      background: #333;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="chat-container">
    <div id="chat-header">Paving Stone Pros Estimator (Local Test)</div>
    <div id="messages"></div>
    <div id="input-row">
      <input id="input" placeholder="Describe your project..." />
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script>
    const backendUrl = "https://pavingstone-chatbot.onrender.com/api/chat";


    // This array is what we send to the backend each time
    const messages = [];

    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send-btn");

    function addMessage(role, content) {
      const div = document.createElement("div");
      div.className = "msg msg-" + role;
      const bubble = document.createElement("span");
      bubble.textContent = content;
      div.appendChild(bubble);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = "";

      // Show user message
      addMessage("user", text);
      messages.push({ role: "user", content: text });

      // Call backend
      try {
        const resp = await fetch(backendUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages })
        });

        const data = await resp.json();
        const reply = data.reply || "Sorry, something went wrong.";
        addMessage("assistant", reply);
        messages.push({ role: "assistant", content: reply });
      } catch (err) {
        console.error(err);
        addMessage("assistant", "Sorry, I couldn’t reach the server.");
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    // Optional: greeting
    addMessage(
      "assistant",
      "Hey! I’m the Paving Stone Pros assistant. Tell me what you’re thinking about (new patio, driveway, walkway, or relevel) and I’ll help you get a rough ballpark estimate. Just remember: it’s only a rough guess, not an exact quote."
    );
  </script>
</body>
</html>
